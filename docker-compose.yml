version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: apico-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apico
      MYSQL_USER: apico
      MYSQL_PASSWORD: apico_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: apico-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://apico:apico_password@mysql:3306/apico
      JWT_SECRET: your-secret-key-change-in-production
      JWT_REFRESH_SECRET: your-refresh-secret-change-in-production
      PORT: 5000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: apico-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - api

volumes:
  mysql_data:
