name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  api-test:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: apico_test
          MYSQL_USER: apico
          MYSQL_PASSWORD: apico_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: api
        env:
          DATABASE_URL: mysql://apico:apico_password@localhost:3306/apico_test

      - name: Run DB migrations
        run: npx prisma migrate deploy
        working-directory: api
        env:
          DATABASE_URL: mysql://apico:apico_password@localhost:3306/apico_test

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: api
        env:
          DATABASE_URL: mysql://apico:apico_password@localhost:3306/apico_test
          JWT_SECRET: ci-test-secret-must-be-32-chars-ok
          JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-minimum
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          NODE_ENV: test
          PORT: 5000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: api/coverage/
          retention-days: 14

  web-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Run component tests
        run: npm test
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [api-test, web-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
        env:
          JWT_SECRET: ci-build-check-secret-32-chars-ok
          JWT_REFRESH_SECRET: ci-build-refresh-secret-32-chars-ok
